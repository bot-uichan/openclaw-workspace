<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>akazdayo 人物クイズ</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <h1>akazdayo 人物クイズ</h1>
      <p class="lead">Tavily検索結果をもとに作成した4択クイズです。</p>

      <section id="quiz-card" class="card">
        <p id="progress" class="progress"></p>
        <h2 id="question"></h2>
        <div id="choices" class="choices"></div>
        <p id="feedback" class="feedback"></p>
        <button id="next-btn" class="btn" hidden>次の問題へ</button>
      </section>

      <section id="result" class="card" hidden>
        <h2>結果</h2>
        <p id="score-text"></p>
        <button id="retry-btn" class="btn">もう一度挑戦</button>
      </section>

      <section class="card sources">
        <h2>出典（Tavily）</h2>
        <ul>
          <li><a href="https://github.com/akazdayo" target="_blank" rel="noopener noreferrer">GitHub: Soma Noda akazdayo</a></li>
          <li><a href="https://github.com/akazdayo/pixelart" target="_blank" rel="noopener noreferrer">GitHub: akazdayo/pixelart</a></li>
          <li><a href="https://osu.ppy.sh/users/36394839/osu" target="_blank" rel="noopener noreferrer">osu! profile: akazdayo</a></li>
          <li><a href="https://discuss.streamlit.io/t/convert-images-into-pixel-art/42768" target="_blank" rel="noopener noreferrer">Streamlit forum: Convert images into pixel art</a></li>
          <li><a href="https://huggingface.co/models?p=52&sort=trending&search=onnx" target="_blank" rel="noopener noreferrer">Hugging Face models (search result page)</a></li>
        </ul>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
