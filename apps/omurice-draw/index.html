<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>オムライスお絵描きWeb 3D</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <h1>🍳 オムライスお絵描きWeb (3D)</h1>
      <p class="subtitle">オムライスをドラッグしてケチャップお絵描き！</p>

      <section class="controls">
        <label>
          ペンサイズ
          <input id="size" type="range" min="2" max="40" value="10" />
        </label>

        <label>
          色
          <select id="color">
            <option value="#cf2b2b">ケチャップ</option>
            <option value="#ffffff">マヨネーズ</option>
            <option value="#7b3f00">デミグラス</option>
            <option value="#2d7f2d">パセリ</option>
          </select>
        </label>

        <button id="clear">やりなおし</button>
        <button id="download">画像保存</button>
      </section>

      <section class="stage-wrap">
        <div id="stage" aria-label="3Dオムライス"></div>
      </section>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="script.js"></script>
  </body>
</html>
